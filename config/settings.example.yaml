identity:
  agent_name: Agent # Имя вашего агента

# Подробнее: docs/yaml/settings/llm.md
llm:
  main_model: unknown # Добавьте свою LLM модель
  available_models:
    - claude-opus-4.7
    - claude-opus-4.6
    - gemini-3.1-pro-preview
    - gemini-3-flash-preview
  # ...можно добавить свои, главное - убедитесь, что llm api url и ключи правильно настроены

  is_multimodal: false
  temperature: 1.0
  max_react_steps: 15

system:
  # Смещение от UTC в часах (например, 3 для МСК)
  timezone: 0

  logging:
    max_file_size_mb: 5.0
    backup_count: 1
    
  # Подробнее: docs/yaml/settings/heartbeat.md
  heartbeat_interval: 600
  continuous_cycle: false
  proactive_guidance: false

  # Подробнее: docs/yaml/settings/event_acceleration.md
  event_acceleration:
    critical_multiplier: 0.0
    high_multiplier: 0.2
    medium_multiplier: 0.6
    low_multiplier: 0.7
    background_multiplier: 0.8

  # Подробнее: docs/yaml/settings/context.md
  context_depth:
    ticks: 15
    detailed_ticks: 4
    tick_action_max_chars: 10000
    tick_result_max_chars: 20000
    tick_thoughts_short_max_chars: 1000
    tick_action_short_max_chars: 100 
    tick_result_short_max_chars: 500

    # Подробнее: docs/yaml/settings/rag.md
    rag:
      enabled: true
      depth_limit: 2               # Глубина поиска (1 = только первичный поиск)
      max_vector_blocks: 5         # Лимит текстовых блоков из векторной БД
      max_graph_nodes: 5           # Лимит узлов из графовой БД
      max_query_chars: 200         # Лимит символов на один чанк текстового запроса


  db:
    # Подробнее: docs/yaml/settings/vector_db.md 
    vector:
      similarity_threshold: 0.65
      embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
      vector_size: 384
      
    # Подробнее: docs/yaml/settings/sql_db.md
    sql:
      tasks: 
        enabled: true
        max_tasks: 10

      personality_traits:
        enabled: true
        max_traits: 10

      mental_states:
        enabled: true
        max_entities: 10

      # Подробнее: docs/yaml/settings/drives.md
      drives:
        enabled: true
        decay_rate: 10.0
        decay_interval_sec: 900
        max_reflections_history: 3
        max_custom_drives: 5

    # Подробнее: docs/yaml/settings/graph_db.md
    graph:

      max_nodes: 5000
      max_edges_per_node: 20


  # Подробнее: docs/subagents.md
  swarm:
    enabled: true
    subagent_model: unknown
    max_concurrent_workers: 3
    
    context_depth:
      max_steps: 20
      detailed_steps: 5
      action_max_chars: 10000
      result_max_chars: 20000
      thoughts_short_max_chars: 2000
      action_short_max_chars: 500
      result_short_max_chars: 1000