identity:
  agent_name: E.X.E.

llm:
  model_name: gemini-3.1-pro-preview 
  # gemini-3.1-pro-preview 
  # gemini-3-flash-preview
  # gemini-3.1-flash-lite-preview
  # gemma-4-31b-it
  temperature: 0.7
  max_react_steps: 15

system:
  timezone: 3  # Смещение от UTC в часах (например, 3 для МСК)

  vector_db:
    similarity_threshold: 0.43
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    vector_size: 384
    auto_rag_top_k: 3
    
  # Интервал между циклами (в секундах)
  loop_interval_sec: 180

  # Непрерывный цикл. Если true, агент будет работать без пауз.
  # Важно: это может очень быстро сжечь ваши квоты в LLM API
  continuous_cycle: false

  # Настройки сокращения времени сна (Heartbeat) при входящих событиях
  event_acceleration:
    medium_multiplier: 0.7         # При событии уровня MEDIUM - умножает остаток сна на 0.7 (сокращает на 30%)
    low_background_multiplier: 0.9 # При событии уровня LOW - умножает остаток сна на 0.9 (сокращает на 10%)

  context_depth:
    ticks: 20 # Tick у LLM = Наблюдение > Мысли > Действие > Результат
    tick_result_max_chars: 10000 # Обрезает длинные ответы от функций в контексте агента