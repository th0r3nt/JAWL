identity:
  agent_name: AgentName # Имя вашего агента

llm:
  model_name: gemini-3.1-pro-preview # Можно поставить любую
  is_multimodal: false # Поставьте true, если model_name мультимодальна
  temperature: 0.7
  max_react_steps: 15

system:
  timezone: 0  # Смещение от UTC в часах (например, 3 для МСК)

  vector_db:

    # Порог семантического сходства. Используется Косинусное расстояние
    # (не путать с Евклидовым расстоянием, где чем ближе к нулю, тем лучше)
    # Для модели MiniLM рабочий порог отсечения фонового шума: 0.60 - 0.65
    similarity_threshold: 0.6 # Косинусное расстояние: 1.0 - абсолютное совпадение, а 0.0 - полное отсутствие связи

    # Локальная модель для генерации эмбеддингов (поддерживаются любые модели FastEmbed). 
    # Можно поставить любую поддерживаемую, например: intfloat/multilingual-e5-small или BAAI/bge-m3
    # Важно: при смене модели обязательно измените vector_size под её размерность и удалите папку базы (src/utils/local/data/vector_db), чтобы она пересоздалась с новым размером векторов
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2" # Можно поставить любую
    vector_size: 384
    auto_rag_top_k: 2
    
  # Интервал между циклами (в секундах)
  heartbeat_interval: 300

  # Непрерывный цикл. Если true, агент будет работать без пауз
  # Важно: это может очень быстро сжечь ваши квоты в LLM API
  continuous_cycle: false

  # Настройки сокращения времени сна (Heartbeat) при входящих событиях разного уровня (CRITICAL, HIGH, MEDIUM, LOW, BACKGROUND)
  event_acceleration:
    critical_multiplier: 0.0 # Если 0.0 - вызывает сразу и прерывает текущий цикл
    high_multiplier: 0.2     # При входящем событии уровня HIGH - умножает остаток сна на 0.2 (сокращает на 80%)
    medium_multiplier: 0.6
    low_multiplier: 0.7
    background_multiplier: 0.8

  context_depth:
    ticks: 15 # Общее количество последних тиков в контексте (Tick = Наблюдение > Мысли > Действие > Результат)
    detailed_ticks: 3 # Сколько из них (самых свежих) выводить подробно для контекста агента (важно в сложных агентстких сценариях)
    tick_action_max_chars: 2000 # Лимит контекста на 1 действие, вызванное агентом в одном тике
    tick_result_max_chars: 5000 # Лимит контекста на 1 результат вызванной функции в одном тике


  # Когнитивные SQL-модули
  sql:
    # Агент может ставить для себя долгосрочные задачи (например: "изучить новый фреймворк на GitHub") и вести рабочие заметки
    tasks:
      enabled: true # Если false - агент не будет знать о существовании этого модуля, экономится контекст
      max_tasks: 15

    # Исходя из своей истории действий, агент может кастомно добавлять/менять свои черты личности для оптимизации взаимодействий с чем-либо
    personality_traits:
      enabled: true
      max_traits: 10 # Макс. добавленных черт личности

    # Агент может хранить сущности (объекты и субъекты - например, знакомых людей или проекты) в своей памяти
    mental_states:
      enabled: true
      max_entities: 15 # Макс. количество сущностей, которые может запомнить агент

    # Система внутренней мотивации агента
    # Делится на Фундаментальные (постоянные) и Кастомные (те, что созданы агентом)
    # Мотивации могут быть в показателе от 0% дефицита мотивации (всё в порядке) до 100% дефицита (караул)
    # Позволяют валидировать действия агента в определенный вектор: 
    # например, фундаментальная мотивация "Любопытство" заставит агента узнавать полезную информацию для своих поставленных задач, а не сидеть сложа руки между своими циклами
    drives:
      enabled: true

      decay_rate: 10.0              # На сколько процентов увеличивается дефицит за 1 интервал
      decay_interval_sec: 600      # Длительность интервала в секундах (600 = 10 минут)
      # decay_interval_sec: 600 + decay_rate: 10.0 = каждую минуту дефицит плавно тикает на +1%

      max_reflections_history: 3   # Сколько последних рефлексий о действиях хранить для контекста мотиваций
      max_custom_drives: 5         # Лимит на создание кастомных мотиваций
