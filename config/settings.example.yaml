identity:
  agent_name: Agent # Имя вашего агента

llm:
  main_model: unknown # Добавьте свою LLM модель
  available_models: # Список моделей, которые агент может ставить по вашей просьбе
    - claude-opus-4.7
    - claude-opus-4.6
    - gemini-3.1-pro-preview
    - gemini-3-flash-preview
  # ...можно добавить свои, главное - убедитесь, что llm api url и ключи правильно настроены

  is_multimodal: false # Поставьте true, если основная модель мультимодальна
  temperature: 1.0
  max_react_steps: 15

system:
  timezone: 0 # Смещение от UTC в часах (например, 3 для МСК)

  logging:
    max_file_size_mb: 5.0
    backup_count: 1

  vector_db:
    similarity_threshold: 0.65

    # Подробнее: docs/yaml/vector_db_models.md
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    vector_size: 384
    auto_rag_top_k: 1
    auto_rag_max_query_chars: 200
    
  heartbeat_interval: 600
  continuous_cycle: false # Если true, агент будет работать вообще без пауз
  proactive_guidance: false # Доп. системные инструкции с рекомендацией к проактивности

  # Подробнее: docs/yaml/event_acceleration.md
  event_acceleration:
    critical_multiplier: 0.0
    high_multiplier: 0.2
    medium_multiplier: 0.6
    low_multiplier: 0.7
    background_multiplier: 0.8

  # Подробнее: docs/yaml/context.md
  context_depth:
    ticks: 15
    detailed_ticks: 3
    tick_action_max_chars: 10000
    tick_result_max_chars: 20000
    tick_thoughts_short_max_chars: 1000
    tick_action_short_max_chars: 100 
    tick_result_short_max_chars: 500

  sql:
    # Задачи для выполнения
    tasks: 
      enabled: true
      max_tasks: 10

    # Динамичные черты личности
    personality_traits:
      enabled: true
      max_traits: 10

    # Сущности (объекты/субъекты) в памяти
    mental_states:
      enabled: true
      max_entities: 10

    # Подробнее: docs/yaml/drives.md
    drives:
      enabled: true
      decay_rate: 10.0
      decay_interval_sec: 900
      max_reflections_history: 3
      max_custom_drives: 5

  # Система делегирования задач для субагентов
  swarm:
    enabled: false
    subagent_model: unknown # Рекомендуется поставить дешевую и быструю модель
    max_concurrent_workers: 3