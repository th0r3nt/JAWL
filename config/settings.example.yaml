identity:
  agent_name: AgentName

llm:
  model_name: gemini-3.1-pro-preview # Можно поставить любую
  temperature: 0.7
  max_react_steps: 15

system:
  timezone: 3  # Смещение от UTC в часах (например, 3 для МСК)

  vector_db:
    similarity_threshold: 0.43
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    vector_size: 384
    auto_rag_top_k: 3
    
  # Интервал между циклами (в секундах)
  heartbeat_interval: 300

  # Непрерывный цикл. Если true, агент будет работать без пауз.
  # Важно: это может очень быстро сжечь ваши квоты в LLM API
  continuous_cycle: false

# Настройки сокращения времени сна (Heartbeat) при входящих событиях разного уровня (CRITICAL, HIGH, MEDIUM, LOW, BACKGROUND)
  event_acceleration:
    critical_multiplier: 0.0       # Если 0.0 - вызывает сразу и прерывает текущий цикл
    high_multiplier: 0.3           # При входящем событии уровня HIGH - умножает остаток сна на 0.3 (сокращает на 70%)
    medium_multiplier: 0.6
    low_multiplier: 0.7
    background_multiplier: 0.8

  context_depth:
    ticks: 30 # Tick у LLM = Наблюдение > Мысли > Действие > Результат
    tick_result_max_chars: 5000 # Обрезает длинные ответы от функций в контексте агента

  max_mental_state_entities: 10 # Макс. количество сущностей, которые может запомнить агент