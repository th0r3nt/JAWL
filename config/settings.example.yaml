identity:
  agent_name: AgentName # Имя вашего агента

llm:
  model_name: gemini-3.1-pro-preview # Можно поставить любую
  temperature: 0.7
  max_react_steps: 15

system:
  timezone: 0  # Смещение от UTC в часах (например, 3 для МСК)

  vector_db:

    # Порог семантического сходства. Используется Косинусное расстояние
    # (не путать с Евклидовым расстоянием, где чем ближе к нулю, тем лучше)
    # Для модели MiniLM рабочий порог отсечения фонового шума: 0.60 - 0.65
    similarity_threshold: 0.65 # Косинусное расстояние: 1.0 - абсолютное совпадение, а 0.0 - полное отсутствие связи

    # Локальная модель для генерации эмбеддингов (поддерживаются любые модели FastEmbed). 
    # Можно поставить любую поддерживаемую, например: intfloat/multilingual-e5-small или BAAI/bge-m3
    # Важно: при смене модели обязательно измените vector_size под её размерность и удалите папку базы (src/utils/local/data/vector_db), чтобы она пересоздалась с новым размером векторов
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2" # Можно поставить любую
    vector_size: 384
    auto_rag_top_k: 2
    
  # Интервал между циклами (в секундах)
  heartbeat_interval: 300

  # Непрерывный цикл. Если true, агент будет работать без пауз
  # Важно: это может очень быстро сжечь ваши квоты в LLM API
  continuous_cycle: false

  # Настройки сокращения времени сна (Heartbeat) при входящих событиях разного уровня (CRITICAL, HIGH, MEDIUM, LOW, BACKGROUND)
  event_acceleration:
    critical_multiplier: 0.0 # Если 0.0 - вызывает сразу и прерывает текущий цикл
    high_multiplier: 0.2     # При входящем событии уровня HIGH - умножает остаток сна на 0.2 (сокращает на 80%)
    medium_multiplier: 0.6
    low_multiplier: 0.7
    background_multiplier: 0.8

  context_depth:
    ticks: 15 # Общее количество последних тиков в контексте (Tick = Наблюдение > Мысли > Действие > Результат)
    detailed_ticks: 3 # Сколько из них (самых свежих) выводить подробно для контекста агента (важно в сложных агентстких сценариях)
    tick_action_max_chars: 2000 # Лимит контекста на 1 действие, вызванное агентом в одном тике
    tick_result_max_chars: 5000 # Лимит контекста на 1 результат вызванной функции в одном тике

  max_mental_state_entities: 10 # Макс. количество сущностей, которые может запомнить агент