host:
  os:
    enabled: true

    # Уровень доступа агента к файловой системе и ОС
    # 0 - SANDBOX   (Read/Write только внутри папки sandbox/)
    # 1 - OBSERVER  (Read для всего кода фреймворка, Write только в sandbox/)
    # 2 - OPERATOR  (Read всей ОС, управление процессами, Write только для файлов фреймворка)
    # 3 - ROOT      (Полный доступ: Read/Write всей системы и управление процессами)
    access_level: 0
    env_access: false # Если false - запрещает агенту читать и изменять файлы *.env во избежание слива ключей

    # Если access level >= 1 и host os включен - агент будет получать в контекст файловую директорию своего фреймворка
    framework_tree_depth: 2

    # Лимиты и таймауты
    monitoring_interval_sec: 30 # Интервал мониторинга метрик хост-пк: datetime, uptime, telemetry, network, sandbox/
    execution_timeout_sec: 60 # Таймаут на выполнение скриптов агентом
    file_read_max_chars: 3000
    file_list_limit: 100
    http_response_max_chars: 5000
    top_processes_limit: 10


telegram:
  telethon:
    enabled: false # Перед включением введите TELETHON_API_ID и TELETHON_API_HASH в .env
    session_name: "agent_telethon" # Находится в src/utils/local/data/telethon/
    private_chat_history_limit: 0 # В контексте Telethon State всегда будут видны последние n сообщений для последних личных чатов (поставить 0, если не нужно)

  aiogram:
    enabled: false # Перед включением введите AIOGRAM_BOT_TOKEN в .env


web:
  # Поиск через DuckDuckGo и чтение страниц
  search:
    enabled: true
    request_timeout_sec: 15
    max_page_chars: 5000

    # Настройки для навыка глубокого исследования
    deep_research:
      max_queries: 10              # Макс. количество параллельных запросов за один вызов
      max_results_per_query: 5     # Сколько топ-ссылок брать из каждого запроса
      max_pages_to_read: 15        # Сколько уникальных страниц в итоге читать параллельно
      total_max_chars: 30000       # Общий лимит символов для всех прочитанных страниц (чтобы не убить контекст)


# Интерфейс, позволяющий агенту менять свои параметры в settings.yaml и управлять системой сразу в рантайме
meta:
  enabled: false 


multimodality:
  enabled: false # Поставьте true, если модель мультимодальна


# Локальный календарь для агента (может ставить себе напоминания, задачи)
calendar:
  enabled: true
  polling_interval_sec: 60
  upcoming_events_limit: 10