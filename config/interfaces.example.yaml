host:
  # Подробнее: docs/yaml/interfaces/host_os.md
  os:
    enabled: false
    desktop_interactions: false

    access_level: 0
    env_access: false 

    require_deploy_sessions: true 
    deploy_max_retries: 5 

    framework_tree_depth: 2
    monitoring_interval_sec: 30
    execution_timeout_sec: 60 

    file_read_max_chars: 10000
    file_list_limit: 100
    top_processes_limit: 10
    file_diff_max_chars: 300 

    workspace_max_opened_files: 15 
    recent_file_changes_limit: 5 
    workspace_max_file_chars: 10000 

  terminal:
    enabled: true
    history_limit: 50 
    context_limit: 10 

# Подробнее: docs/yaml/interfaces/code_graph.md
code_graph:
  enabled: false
  max_search_results: 15
  max_structure_items: 200
  exclude_dirs:
    - "venv"
    - ".venv"
    - "env"
    - "__pycache__"
    - ".git"
    - "node_modules"
    - ".pytest_cache"
    - "dist"
    - "build"

telegram:
  # Подробнее: docs/yaml/interfaces/telegram/telethon.md
  telethon:
    enabled: false
    session_name: "agent_telethon"
    recent_chats_limit: 20
    private_chat_history_limit: 2
    incoming_history_limit: 8

  # Подробнее: docs/yaml/interfaces/telegram/aiogram.md
  aiogram:
    enabled: false
    recent_chats_limit: 20


# Подробнее: docs/yaml/interfaces/github.md
github:
  enabled: false
  agent_account: false
  request_timeout_sec: 15
  history_limit: 10
  polling_interval_sec: 120


# Подробнее: docs/yaml/interfaces/email.md
email:
  enabled: false
  polling_interval_sec: 60
  recent_limit: 5


web:
  # Подробнее: docs/yaml/interfaces/web/http.md
  http:
    enabled: false
    request_timeout_sec: 15
    max_response_chars: 10000

  # Подробнее: docs/yaml/interfaces/web/search.md
  search:
    enabled: false
    search_engine: "duckduckgo" # "duckduckgo", "tavily"
    reader_engine: "trafilatura" # "trafilatura", "jina"
    request_timeout_sec: 15
    max_page_chars: 10000

    # Подробнее: docs/yaml/interfaces/web/deep_research.md
    deep_research:
      max_queries: 10
      max_results_per_query: 5
      max_pages_to_read: 15
      total_max_chars: 30000

  # Подробнее: docs/yaml/interfaces/web/browser.md
  browser:
    enabled: false
    headless: true
    timeout_sec: 30
    idle_timeout_sec: 900

  # Подробнее: docs/yaml/interfaces/web/hooks.md
  hooks:
    enabled: false
    host: "127.0.0.1"
    port: 8080
    history_limit: 20
    preview_max_chars: 200

  # Подробнее: docs/yaml/interfaces/web/rss.md
  rss:
    enabled: false
    polling_interval_sec: 3600
    recent_limit: 5

    feeds:
      - name: "Habr"
        url: "https://habr.com/ru/rss/all/all/"

# Подробнее: docs/yaml/interfaces/meta.md
meta:
  enabled: false

  access_level: 0
  custom_skills_enabled: true

# Подробнее: docs/yaml/interfaces/multimodality.md
multimodality:
  enabled: false

# Подробнее: docs/yaml/interfaces/calendar.md
calendar:
  enabled: false
  polling_interval_sec: 60
  upcoming_events_limit: 10