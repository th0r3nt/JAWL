host:

  # Полноценное взаимодействия с хост-OS с разными уровнями доступа (см. ниже)
  os:
    enabled: false

    # Навыки для графического десктопа (открытие папок, ссылок в браузере, уведомления). Отлично работают на Win/Mac/Linux Desktop
    # На дефолтном сервере (VPS без монитора) лучше отключить за ненадобностью
    desktop_interactions: false

    # Уровень доступа агента к файловой системе и ОС
    # 0 - SANDBOX   (Безопасность. Read/Write только внутри папки sandbox/)
    # 1 - OBSERVER  (Тестировщик. Read для всего кода фреймворка, Write только в sandbox/)
    # 2 - OPERATOR  (Разработчик. Read/Write для всего кода фреймворка)
    # 3 - ROOT      (Системный администратор. Полный доступ: Read/Write всей хост-системы и управление процессами)
    access_level: 0
    env_access: false # Если false - запрещает агенту читать и изменять файлы *.env во избежание слива ключей

    # Напоминание: Если os.enabled: false - агент вообще не будет иметь доступа к хост-машине (сооветственно, настройки access_level, env_access и другие ни на что не влияют, так как интерфейс выключен)
    # Такой же принцип работает и для других интерфейсов

    require_deploy_sessions: true # Если true, агент не сможет менять код своего фреймворка без открытия Deploy Session
    # Например: агент решил изменить фреймворк > вызывает create_deploy_session > переписывает код > вызывает close_deploy_session > код под капотом проверяет, не совершил ли агент цифровое сэппуку (не сломал ли код)

    deploy_max_retries: 5 # Защита от ошибок: сколько попыток давать коду агента на прохождение базовых тестов

    # Если access_level >= 1 и host.os: true - агент будет получать в контекст файловую директорию своего фреймворка
    framework_tree_depth: 1

    # Лимиты и таймауты
    monitoring_interval_sec: 30 # Интервал мониторинга метрик хост-пк: datetime, uptime, telemetry, network, sandbox/
    execution_timeout_sec: 60 # Таймаут на выполнение скриптов агентом

    file_read_max_chars: 10000
    file_list_limit: 100 # Лимит в n файлов при просмотре папок

    top_processes_limit: 10 # Топ n процессов, которые аннигилируют оперативную память хост-пк
    file_diff_max_chars: 300 # При появлении события OS_FILE_MODIFIED (отслеживание изменений в файлах sandbox/) - будут показываться последние n измененных символов 

    workspace_max_opened_files: 15 # Лимит открытых файлов в контексте агента (важно, если агент пишет сложный код)
    recent_file_changes_limit: 5 # В контексте будут отображаться последние n изменений в файлах sandbox/ (краткий diff-формат)
    workspace_max_file_chars: 10000 # Лимит символов на один открытый файл в контексте

  # Консольное окно терминала для общения с агентом
  terminal:
    enabled: true
    history_limit: 50 # Сколько сообщений хранить в локальном JSON (src/local/data/interfaces/host/terminal/history.json)
    context_limit: 10 # Сколько последних сообщений с терминала показывать агенту в системном промпте


# Userbot & Bot
telegram:
  telethon:
    enabled: false # Перед включением введите TELETHON_API_ID и TELETHON_API_HASH в .env

    session_name: "agent_telethon" # Файл сессии находится в src/utils/local/data/telegram/telethon/
    recent_chats_limit: 20 # Сколько последних названий диалогов (группы/чаты/каналы) отображать в контексте агента
    private_chat_history_limit: 2 # Если есть UNREAD в чате - в контексте всегда будут подтягиваться последние n сообщений 
    incoming_history_limit: 8 # Сколько сообщений из истории прикреплять к событию TELETHON_INCOMING_MESSAGE (если непрочитанных больше - подтянется по их количеству)

  aiogram:
    enabled: false # Перед включением введите AIOGRAM_BOT_TOKEN в .env
    recent_chats_limit: 20


# Взаимодействия с API GitHub
github:
  enabled: false # Перед включением добавьте GITHUB_TOKEN в .env (работает и без него, но лимит ~60 запросов в час)
  agent_account: false # Если true - агент получает полноценный доступ к аккаунту токена

  request_timeout_sec: 15
  history_limit: 10 # История запросов к API GitHub в контексте агента

  polling_interval_sec: 120 # Интервал фонового обновления профиля агента (уведомления, репозитории)


# Почтовый ящик для агента
email:
  enabled: false # Перед включением добавьте EMAIL_ACCOUNT и EMAIL_PASSWORD в .env
  polling_interval_sec: 60
  recent_limit: 5 # Отображает последние n писем в кратком формате
  # Сервера и порты система подберет сама


# Взаимодействие с Web интерфейсами
web:

  # HTTP запросы и скачивание файлов
  http:
    enabled: false
    request_timeout_sec: 15
    max_response_chars: 10000

  # Поиск и чтение страниц
  search:
    enabled: false

    # Варианты: "duckduckgo", "tavily"
    search_engine: "duckduckgo" # Перед включением tavily введите TAVILY_API_KEY в .env

    # Варианты: "trafilatura", "jina"
    reader_engine: "jina"

    request_timeout_sec: 15
    max_page_chars: 10000

    # Настройки навыка глубокого исследования
    deep_research:
      max_queries: 10              # Макс. количество параллельных запросов за один вызов
      max_results_per_query: 5     # Сколько топ-ссылок брать из каждого запроса
      max_pages_to_read: 15        # Сколько уникальных страниц в итоге читать параллельно
      total_max_chars: 30000       # Общий лимит символов для всех прочитанных страниц (чтобы не убить контекст)

  # Полноценный браузер (Playwright)
  browser:
    enabled: false
    headless: true
    timeout_sec: 30
    idle_timeout_sec: 900


# Интерфейс, позволяющий агенту менять свои параметры в settings/interfaces.yaml и управлять системой в рантайме
meta:
  enabled: false

  # 0 - SAFE           (возможность менять llm_model/temperature)
  # 1 - CONFIGURATOR   (возможность менять heartbeat_interval/max_react_steps/context_depth)
  # 2 - ARCHITECT      (дополнительные навыки: off_system()/reboot_system(), toggle_interface() - возможность включать/отключать интерфейсы)
  # 3 - CREATOR        (возможность создавать кастомные навыки для себя из скриптов sandbox/)
  access_level: 0
  custom_skills_enabled: true # Если false, отключает загрузку и создание кастомных навыков


# Мультимодальность: картинки/видео/аудио в остальных интерфейсах
multimodality:
  enabled: false # Поставьте true, если основная LLM модель мультимодальна


# Локальный календарь (напоминания, задачи, события)
calendar:
  enabled: false
  polling_interval_sec: 60
  upcoming_events_limit: 10