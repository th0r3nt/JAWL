host:
  os:
    enabled: true

    # Уровень доступа агента к файловой системе, на которой он запущен
    # 0 - cage      (Read/Write только внутри папки sandbox/)
    # 1 - voyeur    (Read для всего кода фреймворка, Write только в sandbox/)
    # 2 - surgeon   (Read для всей ОС-системы, Write только для файлов фреймворка (агент может переписать собственный код))
    # 3 - god_mode  (Полный доступ: Read/Write всей системы)
    madness_level: 1
    env_access: false # Запрещает агенту читать и изменять файлы *.env

  terminal:
    enabled: true

  # Лимиты и таймауты
  monitoring_interval_sec: 20 # Интервал мониторинга метрик хост-пк: datetime, uptime, telemetry, network, sandbox/
  execution_timeout_sec: 60 # Таймаут на выполнение скриптов агентом
  file_read_max_lines: 5000 
  file_list_limit: 100
  http_response_max_chars: 5000
  top_processes_limit: 10

telegram:
  telethon:
    enabled: true
    session_name: "agent_telethon"

  aiogram:
    enabled: true