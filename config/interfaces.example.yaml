host:

  os:
    enabled: false
    desktop_interactions: false

    # Уровень прав доступа агента к хост-машине (0 - SANDBOX, 1 - OBSERVER, 2 - OPERATOR, 3 - ROOT).
    # Подробнее про уровни доступа и безопасность: см. docs/yaml/access_levels.md
    access_level: 0
    env_access: false 

    # Механизм самомодификации и Copy-on-Write бекапов. См. docs/yaml/access_levels.md
    require_deploy_sessions: true 
    deploy_max_retries: 5 

    framework_tree_depth: 1

    monitoring_interval_sec: 30
    execution_timeout_sec: 60 

    file_read_max_chars: 10000
    file_list_limit: 100
    top_processes_limit: 10
    file_diff_max_chars: 300 

    workspace_max_opened_files: 15
    recent_file_changes_limit: 5 
    workspace_max_file_chars: 10000 

  terminal:
    enabled: true
    history_limit: 50 
    context_limit: 10 


telegram:
  # Userbot
  telethon:
    enabled: false
    session_name: "agent_telethon"
    recent_chats_limit: 20
    private_chat_history_limit: 2
    incoming_history_limit: 8

  # Классический Bot
  aiogram:
    enabled: false
    recent_chats_limit: 20


github:
  enabled: false
  agent_account: false
  request_timeout_sec: 15
  history_limit: 10
  polling_interval_sec: 120


email:
  enabled: false
  polling_interval_sec: 60
  recent_limit: 5


web:
  http:
    enabled: false
    request_timeout_sec: 15
    max_response_chars: 10000

  search:
    enabled: false
    search_engine: "duckduckgo" # "duckduckgo", "tavily"
    reader_engine: "jina" # "trafilatura", "jina"
    request_timeout_sec: 15
    max_page_chars: 10000

    deep_research:
      max_queries: 10
      max_results_per_query: 5
      max_pages_to_read: 15
      total_max_chars: 30000

  browser:
    enabled: false
    headless: true
    timeout_sec: 30
    idle_timeout_sec: 900

  # Подробнее: см. docs/yaml/webhooks_setup.md
  hooks:
    enabled: false
    host: "127.0.0.1"
    port: 8080
    history_limit: 20
    preview_max_chars: 200

  rss:
    enabled: false
    polling_interval_sec: 3600
    recent_limit: 5

    # Подробнее: docs/yaml/rss_feeds.md
    feeds:
      - name: "Habr"
        url: "https://habr.com/ru/rss/all/all/"


meta:
  enabled: false

  # Подробнее: docs/yaml/access_levels.md
  access_level: 0
  custom_skills_enabled: true


multimodality:
  enabled: false


calendar:
  enabled: false
  polling_interval_sec: 60
  upcoming_events_limit: 10